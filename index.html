function md(t){
  if(!t)return '';
  // Split into lines and process blocks
  const lines = t.split('\n');
  const blocks = [];
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // Detect table block: line starts with |
    if (line.trim().startsWith('|')) {
      const tableLines = [];
      while (i < lines.length && lines[i].trim().startsWith('|')) {
        tableLines.push(lines[i].trim());
        i++;
      }
      // Parse table
      const rows = [];
      let sepIdx = -1;
      for (let r = 0; r < tableLines.length; r++) {
        const cells = tableLines[r].split('|').slice(1); // split and remove first empty
        // Remove last empty if line ends with |
        if (cells.length > 0 && cells[cells.length-1].trim() === '') cells.pop();
        const trimmed = cells.map(c => c.trim());
        // Check if this is a separator row (all cells are like ---, :--:, etc.)
        if (trimmed.every(c => /^[-:\s]+$/.test(c) && c.length > 0)) {
          sepIdx = r;
          continue; // skip separator row
        }
        rows.push({ cells: trimmed, isHeader: sepIdx === -1 && r === 0 && tableLines.length > 1 });
      }
      // If we found a separator, first row before it is header
      if (sepIdx >= 0 && rows.length > 0) {
        rows[0].isHeader = true;
      }
      let html = '<table>';
      for (const row of rows) {
        const tag = row.isHeader ? 'th' : 'td';
        html += '<tr>' + row.cells.map(c => `<${tag}>${c.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}</${tag}>`).join('') + '</tr>';
      }
      html += '</table>';
      blocks.push(html);
      continue;
    }

    // Headings
    if (line.startsWith('## ')) { blocks.push('<h2>' + line.slice(3) + '</h2>'); i++; continue; }
    if (line.startsWith('### ')) { blocks.push('<h3>' + line.slice(4) + '</h3>'); i++; continue; }

    // List items - collect consecutive
    if (/^[-*] /.test(line.trim()) || /^\d+\.\s/.test(line.trim())) {
      const items = [];
      while (i < lines.length && (/^[-*] /.test(lines[i].trim()) || /^\d+\.\s/.test(lines[i].trim()))) {
        items.push(lines[i].trim().replace(/^[-*]\s+/, '').replace(/^\d+\.\s+/, ''));
        i++;
      }
      blocks.push('<ul>' + items.map(it => '<li>' + it.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>') + '</li>').join('') + '</ul>');
      continue;
    }

    // Blockquote
    if (line.startsWith('> ')) {
      blocks.push('<p style="color:#7f7766;font-style:italic;border-left:3px solid #d5d1c3;padding-left:12px;margin:8px 0">' + line.slice(2).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>') + '</p>');
      i++; continue;
    }

    // Horizontal rule
    if (/^---+$/.test(line.trim())) { blocks.push('<hr style="border:none;border-top:1px solid #d5d1c3;margin:16px 0">'); i++; continue; }

    // Empty line
    if (line.trim() === '') { i++; continue; }

    // Regular paragraph
    let para = line;
    i++;
    while (i < lines.length && lines[i].trim() !== '' && !lines[i].startsWith('#') && !lines[i].trim().startsWith('|') && !lines[i].trim().startsWith('-') && !lines[i].trim().startsWith('>') && !/^\d+\.\s/.test(lines[i].trim()) && !/^---/.test(lines[i].trim())) {
      para += '<br>' + lines[i];
      i++;
    }
    para = para.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    blocks.push('<p>' + para + '</p>');
  }

  return blocks.join('');
}

// ★ Proxy URL — set to your Cloudflare Worker
const PROXY_URL='https://studypath-proxy.studypathai.workers.dev';

async function callAI(msgs,onChunk){
  const res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'gpt-4.1-nano',messages:msgs,stream:true,temperature:0.7,max_tokens:4000})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'API Error: '+res.status);}
  const reader=res.body.getReader(),dec=new TextDecoder();let full='';
  while(true){const{done,value}=await reader.read();if(done)break;
    for(const line of dec.decode(value).split('\n').filter(l=>l.startsWith('data: '))){
      const d=line.slice(6);if(d==='[DONE]')continue;
      try{full+=JSON.parse(d).choices?.[0]?.delta?.content||'';onChunk(full);}catch(e){}
    }}
  return full;
}

    <div className="flex flex-wrap gap-2">{avail.map(s=>(
      <span key={s} onClick={()=>tog(s)} className={`chip font-jp ${subs.includes(s)?'chip-on':'chip-off'}`}>
        {s==='英語'&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}{s}</span>))}</div>

  const rm=i=>set({...d,goals:goals.filter((_,j)=>j!==i)});
  useEffect(()=>{if(!d.goals?.length)set({...d,goals:[{school:'',faculty:'',examType:'一般入試'}]});},[]);
  return(<div className="fade-in">

    <p className="text-ink-500 mb-6 font-jp text-sm">志望校と入試方式を教えてください</p>

        <span key={o} onClick={()=>set({...d,nextExam:o})} className={`chip font-jp ${d.nextExam===o?'chip-on':'chip-off'}`}>{o}</span>))}</div></div>
    <div className="flex gap-3 mt-8">
      <button onClick={back} className="flex-1 py-3.5 rounded-xl border border-ink-200 text-sm font-jp hover:bg-white transition">← 戻る</button>
      <button onClick={next} className="flex-[2] py-3.5 rounded-xl bg-accent text-white font-medium text-sm hover:bg-accent-dark transition font-jp">AIプランを生成 ✦</button>
    </div>
  </div>);
}

function Result({plan,exam,sPlan,sExam,reset,genExam,examDone}){
  const[tab,setTab]=useState('plan');
  const ref=useRef(null);
  const txt=tab==='plan'?plan:exam;
  const str=tab==='plan'?sPlan:sExam;
  useEffect(()=>{if(ref.current&&str)ref.current.scrollTop=ref.current.scrollHeight;},[txt,str]);
  return(<div className="fade-in">
    <div className="flex items-center justify-between mb-4">
      <h2 className="text-xl font-semibold font-jp">あなたの学習プラン</h2>
      <button onClick={reset} className="px-4 py-2 rounded-lg border border-ink-200 text-xs font-jp hover:bg-white transition">最初からやり直す</button>
    </div>
    <div className="flex gap-2 mb-4">
      <button onClick={()=>setTab('plan')} className={`tab-btn font-jp ${tab==='plan'?'tab-a':'tab-i'}`}>長期プラン</button>
      <button onClick={()=>{setTab('exam');if(!examDone)genExam();}} className={`tab-btn font-jp ${tab==='exam'?'tab-a':'tab-i'}`}>次の模試対策</button>
    </div>
    {txt?(<div ref={ref} className="bg-white rounded-2xl border border-ink-100 p-5 sm:p-7 max-h-[70vh] overflow-y-auto">
      {str&&<div className="flex items-center gap-1.5 mb-3"><span className="w-1.5 h-1.5 rounded-full bg-accent pulse-dot"/><span className="text-xs text-ink-400 font-jp">生成中...</span></div>}
      <div className="mc font-jp text-sm text-ink-800 leading-relaxed" dangerouslySetInnerHTML={{__html:md(txt)}}/>
    </div>):(<div className="flex flex-col items-center py-16 fade-in">
      <div className="flex gap-1.5 mb-6"><div className="w-2.5 h-2.5 rounded-full bg-accent typing-dot"/><div className="w-2.5 h-2.5 rounded-full bg-accent typing-dot"/><div className="w-2.5 h-2.5 rounded-full bg-accent typing-dot"/></div>
      <p className="text-ink-500 font-jp text-sm">{tab==='plan'?'長期プランを生成中...':'模試対策を生成中...'}</p></div>)}
    {!str&&txt&&(<div className="mt-4 slide-up"><button onClick={()=>{
      const b=new Blob([txt],{type:'text/markdown'});const u=URL.createObjectURL(b);
      const a=document.createElement('a');a.href=u;a.download=tab==='plan'?'study-plan.md':'exam-strategy.md';a.click();URL.revokeObjectURL(u);
    }} className="w-full py-3 rounded-xl border border-ink-200 text-sm font-jp hover:bg-white transition flex items-center justify-center gap-2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Markdownで保存</button></div>)}
  </div>);
}

function App(){
  const[step,setStep]=useState(0);
  const[d,setD]=useState(()=>ld()?.d||{goals:[],subjects:['英語']});
  const[plan,setPlan]=useState(()=>ld()?.plan||'');
  const[exam,setExam]=useState(()=>ld()?.exam||'');
  const[sPlan,setSPlan]=useState(false);
  const[sExam,setSExam]=useState(false);
  const[examDone,setExamDone]=useState(()=>!!(ld()?.exam));
  const[err,setErr]=useState('');
  const[view,setView]=useState(()=>ld()?.plan?'result':'form');

  useEffect(()=>{sv({d,plan,exam});},[d,plan,exam]);

  const ctx=()=>{
    const sl=(d.subjects||[]).map(s=>{const v=d.scores?.[s];
      return v?.dev||v?.pt?`- ${s}: 偏差値${v.dev||'?'} / 得点${v.pt||'?'}/${v.max||'?'}`:`- ${s}: 未入力`;}).join('\n');
    return `## 生徒情報\n- 学年: ${d.grade}\n- 文理: ${d.stream}\n- 平日学習時間: ${d.wdH}\n- 休日学習時間: ${d.weH}\n- 総合偏差値: ${d.totalDev||'未入力'}\n- 直近の模試: ${d.examName||'未入力'}\n- 次の模試予定: ${d.nextExam||'未定'}\n\n## 志望校\n${(d.goals||[]).filter(g=>g.school).map((g,i)=>`- 第${i+1}志望: ${g.school} ${g.faculty}（${g.examType}）`).join('\n')}\n\n## 受験科目（これ以外の科目は一切触れないでください）\n${(d.subjects||[]).join('、')}\n\n## 科目別成績\n${sl}`;
  };

  const genPlan=async()=>{
    setErr('');setPlan('');setExam('');setExamDone(false);setSPlan(true);setView('result');
    try{await callAI([{role:'system',content:SYS},{role:'user',content:ctx()+'\n\n'+PLAN_Q}],t=>setPlan(t));}catch(e){setErr(e.message);}
    setSPlan(false);
  };
  const genExam=async()=>{
    if(examDone)return;setExam('');setSExam(true);setExamDone(true);
    try{await callAI([{role:'system',content:SYS},{role:'user',content:ctx()+'\n\n'+EXAM_Q}],t=>setExam(t));}catch(e){setErr(e.message);}
    setSExam(false);
  };
  const reset=()=>{setD({goals:[],subjects:['英語']});setPlan('');setExam('');setExamDone(false);setStep(0);setView('form');setErr('');};
  const labels=['基本情報','受験科目','志望校','成績入力'];

  return(<div className="min-h-screen">
    <header className="border-b border-ink-100 bg-washi/80 backdrop-blur-sm sticky top-0 z-40">
      <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-2.5">
          <div className="w-8 h-8 rounded-lg bg-sumi flex items-center justify-center">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f8f6f1" strokeWidth="2" strokeLinecap="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2zM22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
          </div><span className="font-semibold text-sm tracking-tight">StudyPath AI</span>
        </div><span className="text-xs text-ink-400 font-jp">Powered by AI</span>
      </div></header>
    <main className="max-w-2xl mx-auto px-4 py-8">
      {err&&<div className="mb-6 p-4 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm font-jp fade-in">
        <p className="font-medium mb-1">エラーが発生しました</p><p className="text-xs">{err}</p>
        <button onClick={()=>setErr('')} className="mt-2 text-xs underline">閉じる</button></div>}
      {view==='form'&&<><Steps c={step} t={4} labels={labels}/>
        {step===0&&<S1 d={d} set={setD} next={()=>setStep(1)}/>}
        {step===1&&<S2 d={d} set={setD} next={()=>setStep(2)} back={()=>setStep(0)}/>}
        {step===2&&<S3 d={d} set={setD} next={()=>setStep(3)} back={()=>setStep(1)}/>}
        {step===3&&<S4 d={d} set={setD} next={genPlan} back={()=>setStep(2)}/>}</>}
      {view==='result'&&<Result plan={plan} exam={exam} sPlan={sPlan} sExam={sExam} reset={reset} genExam={genExam} examDone={examDone}/>}
    </main>
    <footer className="border-t border-ink-100 mt-16 py-6"><p className="text-center text-xs text-ink-400 font-jp">StudyPath AI — Data stored locally in your browser.</p></footer>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
