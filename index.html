<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Constants ───
const STORAGE_KEY = 'studypath_data';
const GRADES = ['高校1年', '高校2年', '高校3年', '浪人'];
const STREAMS = ['文系', '理系', '国公立文系', '国公立理系', '私立文系', '私立理系', '芸術系', '未定'];
const SUBJECTS_BUNKEI = ['英語', '数学(IAIIB)', '国語(現代文)', '国語(古典)', '日本史', '世界史', '地理', '政治経済', '倫理'];
const SUBJECTS_RIKEI = ['英語', '数学(IAIIB)', '数学(III)', '物理', '化学', '生物', '地学', '国語(現代文)', '国語(古典)'];
const LEVELS = ['苦手', 'やや苦手', '普通', 'やや得意', '得意'];

// ─── Helpers ───
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadData() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; }
}

function simpleMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/### (.+)/g, '<h3>$1</h3>')
    .replace(/## (.+)/g, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^\- (.+)/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, (m) => `<ul>${m}</ul>`)
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  if (!html.startsWith('<')) html = '<p>' + html + '</p>';
  return html;
}

// ─── OpenAI Call ───
async function callOpenAI(apiKey, messages, onChunk) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: 'gpt-4.1-nano',
      messages,
      stream: true,
      temperature: 0.7,
      max_tokens: 4000,
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API Error: ${res.status}`);
  }
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let full = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value);
    const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
    for (const line of lines) {
      const data = line.slice(6);
      if (data === '[DONE]') continue;
      try {
        const parsed = JSON.parse(data);
        const delta = parsed.choices?.[0]?.delta?.content || '';
        full += delta;
        onChunk(full);
      } catch(e) {}
    }
  }
  return full;
}

// ─── System Prompt ───
const SYSTEM_PROMPT = `あなたは日本の大学受験指導に精通した学習コーチAIです。

以下のルールに従って、生徒に合った学習プランを作成してください：

1. 生徒の現在の学力と志望校のギャップを分析し、現実的かつ挑戦的な計画を立てること
2. 各科目の学習順序は「基礎固め → 標準レベル → 応用・発展 → 過去問演習」の流れを基本とすること
3. 推奨教材は市販の有名参考書・問題集から、偏差値帯に合ったものを具体的な書名で挙げること
4. 週次スケジュールは生徒の学習可能時間を超えないこと
5. 各フェーズに具体的な期間と到達目標を設定すること
6. 励ましの言葉を適度に含め、モチベーションを高めること

出力形式はMarkdownで、以下の構成にしてください：
### 全体アクションプラン
（受験までのフェーズ分けと各フェーズの期間・目標）

### 科目別学習ステップ
（各科目で取り組む単元の順序、具体的な教材名、目安時間）

### 週次スケジュール
（曜日×時間帯の具体的な学習割り当て）

### 今日から始める最初の一歩
（今日すぐ取り組める具体的なアクション3つ）`;

// ─── Components ───

function ApiKeyModal({ onSubmit }) {
  const [key, setKey] = useState('');
  return (
    <div className="fixed inset-0 bg-sumi/60 flex items-center justify-center z-50 p-4">
      <div className="bg-washi rounded-2xl p-8 max-w-md w-full fade-in shadow-xl">
        <div className="w-12 h-12 rounded-xl bg-accent/10 flex items-center justify-center mb-5">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c85a3a" strokeWidth="2" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <h2 className="text-xl font-semibold mb-2 font-jp">OpenAI API Key</h2>
        <p className="text-ink-500 text-sm mb-5 font-jp leading-relaxed">
          APIキーはブラウザのローカルストレージにのみ保存され、OpenAI以外に送信されません。
        </p>
        <input
          type="password"
          placeholder="sk-..."
          value={key}
          onChange={e => setKey(e.target.value)}
          className="w-full px-4 py-3 rounded-xl border border-ink-200 bg-white text-sm font-mono mb-4"
        />
        <button
          onClick={() => key.startsWith('sk-') && onSubmit(key)}
          disabled={!key.startsWith('sk-')}
          className="w-full py-3 rounded-xl bg-sumi text-washi font-medium text-sm hover:bg-sumi-light transition disabled:opacity-30 disabled:cursor-not-allowed"
        >
          設定する
        </button>
      </div>
    </div>
  );
}

function StepIndicator({ current, total }) {
  return (
    <div className="flex items-center gap-2 mb-8">
      {Array.from({length: total}, (_, i) => (
        <React.Fragment key={i}>
          <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-medium transition-all ${
            i < current ? 'bg-accent text-white' :
            i === current ? 'bg-sumi text-washi ring-2 ring-accent/30 ring-offset-2 ring-offset-washi' :
            'bg-ink-100 text-ink-400'
          }`}>{i + 1}</div>
          {i < total - 1 && <div className={`flex-1 h-0.5 ${i < current ? 'bg-accent' : 'bg-ink-200'}`}/>}
        </React.Fragment>
      ))}
    </div>
  );
}

function Step1({ data, onChange, onNext }) {
  return (
    <div className="fade-in">
      <h2 className="text-2xl font-semibold mb-1 font-jp">あなたについて教えてください</h2>
      <p className="text-ink-500 mb-8 font-jp text-sm">基本情報を入力すると、最適なプランを作成します</p>

      <div className="space-y-5">
        <div>
          <label className="block text-xs font-medium text-ink-600 mb-1.5 font-jp">学年</label>
          <div className="grid grid-cols-4 gap-2">
            {GRADES.map(g => (
              <button key={g} onClick={() => onChange({...data, grade: g})}
                className={`py-2.5 rounded-xl text-sm font-jp transition ${data.grade === g ? 'bg-sumi text-washi' : 'bg-white border border-ink-200 hover:border-ink-400'}`}
              >{g}</button>
            ))}
          </div>
        </div>

        <div>
          <label className="block text-xs font-medium text-ink-600 mb-1.5 font-jp">文理・志望系統</label>
          <div className="grid grid-cols-4 gap-2">
            {STREAMS.map(s => (
              <button key={s} onClick={() => onChange({...data, stream: s})}
                className={`py-2.5 rounded-xl text-xs font-jp transition ${data.stream === s ? 'bg-sumi text-washi' : 'bg-white border border-ink-200 hover:border-ink-400'}`}
              >{s}</button>
            ))}
          </div>
        </div>

        <div className="grid grid-cols-2 gap-4">
          <div>
            <label className="block text-xs font-medium text-ink-600 mb-1.5 font-jp">平日の学習時間</label>
            <select value={data.weekdayHours || ''} onChange={e => onChange({...data, weekdayHours: e.target.value})}
              className="w-full px-4 py-3 rounded-xl border border-ink-200 bg-white text-sm font-jp">
              <option value="">選択</option>
              {['1時間', '2時間', '3時間', '4時間', '5時間以上'].map(h => <option key={h} value={h}>{h}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-ink-600 mb-1.5 font-jp">休日の学習時間</label>
            <select value={data.weekendHours || ''} onChange={e => onChange({...data, weekendHours: e.target.value})}
              className="w-full px-4 py-3 rounded-xl border border-ink-200 bg-white text-sm font-jp">
              <option value="">選択</option>
              {['2時間', '3時間', '4時間', '5時間', '6時間', '8時間以上'].map(h => <option key={h} value={h}>{h}</option>)}
            </select>
          </div>
        </div>
      </div>

      <button onClick={onNext}
        disabled={!data.grade || !data.stream || !data.weekdayHours || !data.weekendHours}
        className="mt-8 w-full py-3.5 rounded-xl bg-sumi text-washi font-medium text-sm hover:bg-sumi-light transition disabled:opacity-30 disabled:cursor-not-allowed font-jp">
        次へ →
      </button>
    </div>
  );
}

function Step2({ data, onChange, onNext, onBack }) {
  const addGoal = () => onChange({...data, goals: [...(data.goals||[]), { school:'', faculty:'', priority: data.goals?.length === 0 ? '第1志望' : `第${(data.goals?.length||0)+1}志望` }]});
  const updateGoal = (i, field, val) => {
    const goals = [...(data.goals||[])];
    goals[i] = {...goals[i], [field]: val};
    onChange({...data, goals});
  };
  const removeGoal = (i) => onChange({...data, goals: (data.goals||[]).filter((_,j)=>j!==i)});

  useEffect(() => { if (!data.goals?.length) addGoal(); }, []);

  return (
    <div className="fade-in">
      <h2 className="text-2xl font-semibold mb-1 font-jp">志望校を設定</h2>
      <p className="text-ink-500 mb-8 font-jp text-sm">目標が明確なほど、精度の高いプランを作成できます</p>

      <div className="space-y-4">
        {(data.goals||[]).map((g, i) => (
          <div key={i} className="bg-white rounded-xl p-4 border border-ink-100 step-card">
            <div className="flex items-center justify-between mb-3">
              <span className="text-xs font-medium text-accent font-jp">{g.priority}</span>
              {i > 0 && <button onClick={() => removeGoal(i)} className="text-ink-400 hover:text-accent text-xs font-jp">削除</button>}
            </div>
            <div className="grid grid-cols-2 gap-3">
              <input placeholder="大学名" value={g.school} onChange={e => updateGoal(i,'school',e.target.value)}
                className="px-3 py-2.5 rounded-lg border border-ink-200 text-sm font-jp" />
              <input placeholder="学部・学科" value={g.faculty} onChange={e => updateGoal(i,'faculty',e.target.value)}
                className="px-3 py-2.5 rounded-lg border border-ink-200 text-sm font-jp" />
            </div>
          </div>
        ))}
      </div>

      {(data.goals||[]).length < 3 && (
        <button onClick={addGoal} className="mt-3 text-sm text-accent hover:text-accent-dark font-jp flex items-center gap-1">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          志望校を追加
        </button>
      )}

      <div className="mt-6">
        <label className="block text-xs font-medium text-ink-600 mb-1.5 font-jp">目標偏差値（任意）</label>
        <input placeholder="例: 65" value={data.targetScore||''} onChange={e => onChange({...data, targetScore: e.target.value})}
          className="w-full px-4 py-3 rounded-xl border border-ink-200 bg-white text-sm font-jp" />
      </div>

      <div className="flex gap-3 mt-8">
        <button onClick={onBack} className="flex-1 py-3.5 rounded-xl border border-ink-200 text-sm font-jp hover:bg-white transition">← 戻る</button>
        <button onClick={onNext}
          disabled={!(data.goals||[]).some(g => g.school)}
          className="flex-[2] py-3.5 rounded-xl bg-sumi text-washi font-medium text-sm hover:bg-sumi-light transition disabled:opacity-30 font-jp">
          次へ →
        </button>
      </div>
    </div>
  );
}

function Step3({ data, onChange, onNext, onBack }) {
  const subjects = data.stream?.includes('理') ? SUBJECTS_RIKEI : SUBJECTS_BUNKEI;
  const levels = data.subjectLevels || {};

  return (
    <div className="fade-in">
      <h2 className="text-2xl font-semibold mb-1 font-jp">科目別の自己評価</h2>
      <p className="text-ink-500 mb-8 font-jp text-sm">現在の得意・不得意を教えてください</p>

      <div className="space-y-3">
        {subjects.map(sub => (
          <div key={sub} className="bg-white rounded-xl p-4 border border-ink-100 step-card">
            <div className="flex items-center justify-between">
              <span className="text-sm font-medium font-jp min-w-[120px]">{sub}</span>
              <div className="flex gap-1.5">
                {LEVELS.map((lv, li) => (
                  <button key={lv} onClick={() => onChange({...data, subjectLevels: {...levels, [sub]: lv}})}
                    className={`px-3 py-1.5 rounded-lg text-xs font-jp transition ${
                      levels[sub] === lv
                        ? li <= 1 ? 'bg-red-50 text-red-700 ring-1 ring-red-200'
                          : li === 2 ? 'bg-ink-100 text-ink-700 ring-1 ring-ink-300'
                          : 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200'
                        : 'bg-ink-50 text-ink-400 hover:bg-ink-100'
                    }`}
                  >{lv}</button>
                ))}
              </div>
            </div>
          </div>
        ))}
      </div>

      <div className="flex gap-3 mt-8">
        <button onClick={onBack} className="flex-1 py-3.5 rounded-xl border border-ink-200 text-sm font-jp hover:bg-white transition">← 戻る</button>
        <button onClick={onNext}
          className="flex-[2] py-3.5 rounded-xl bg-accent text-white font-medium text-sm hover:bg-accent-dark transition font-jp">
          AIプランを生成 ✦
        </button>
      </div>
    </div>
  );
}

function LoadingState() {
  return (
    <div className="flex flex-col items-center justify-center py-16 fade-in">
      <div className="flex gap-1.5 mb-6">
        <div className="w-2.5 h-2.5 rounded-full bg-accent typing-dot"></div>
        <div className="w-2.5 h-2.5 rounded-full bg-accent typing-dot"></div>
        <div className="w-2.5 h-2.5 rounded-full bg-accent typing-dot"></div>
      </div>
      <p className="text-ink-500 font-jp text-sm">AIがあなた専用の学習プランを作成中...</p>
      <p className="text-ink-400 font-jp text-xs mt-1">30秒〜1分ほどお待ちください</p>
    </div>
  );
}

function PlanResult({ plan, streaming, onReset, onSaveTasks }) {
  const contentRef = useRef(null);

  useEffect(() => {
    if (contentRef.current && streaming) {
      contentRef.current.scrollTop = contentRef.current.scrollHeight;
    }
  }, [plan, streaming]);

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h2 className="text-2xl font-semibold font-jp">あなたの学習プラン</h2>
          <p className="text-ink-500 text-xs font-jp mt-0.5">
            {streaming ? (
              <span className="flex items-center gap-1.5">
                <span className="w-1.5 h-1.5 rounded-full bg-accent pulse-dot"></span>
                生成中...
              </span>
            ) : 'AI生成完了'}
          </p>
        </div>
        <div className="flex gap-2">
          {!streaming && (
            <button onClick={onReset}
              className="px-4 py-2 rounded-lg border border-ink-200 text-xs font-jp hover:bg-white transition">
              新しく作成
            </button>
          )}
        </div>
      </div>

      <div ref={contentRef}
        className="bg-white rounded-2xl border border-ink-100 p-6 sm:p-8 max-h-[70vh] overflow-y-auto">
        <div className="markdown-content font-jp text-sm text-ink-800 leading-relaxed"
          dangerouslySetInnerHTML={{ __html: simpleMarkdown(plan) }} />
      </div>

      {!streaming && (
        <div className="mt-6 flex gap-3 slide-up">
          <button onClick={() => {
            const blob = new Blob([plan], {type:'text/markdown'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'study-plan.md'; a.click();
            URL.revokeObjectURL(url);
          }} className="flex-1 py-3 rounded-xl border border-ink-200 text-sm font-jp hover:bg-white transition flex items-center justify-center gap-2">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Markdownで保存
          </button>
          <button onClick={onSaveTasks}
            className="flex-[2] py-3 rounded-xl bg-accent text-white text-sm font-jp font-medium hover:bg-accent-dark transition flex items-center justify-center gap-2">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            タスク管理へ
          </button>
        </div>
      )}
    </div>
  );
}

function TaskManager({ tasks, onToggle, onBack }) {
  const completed = tasks.filter(t => t.done).length;
  const pct = tasks.length ? Math.round(completed / tasks.length * 100) : 0;

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h2 className="text-2xl font-semibold font-jp">今日のタスク</h2>
          <p className="text-ink-500 text-xs font-jp mt-0.5">{completed}/{tasks.length} 完了 ({pct}%)</p>
        </div>
        <button onClick={onBack} className="px-4 py-2 rounded-lg border border-ink-200 text-xs font-jp hover:bg-white transition">
          ← プランに戻る
        </button>
      </div>

      <div className="mb-6">
        <div className="h-2 bg-ink-100 rounded-full overflow-hidden">
          <div className="h-full bg-accent rounded-full transition-all duration-500" style={{width: `${pct}%`}}></div>
        </div>
      </div>

      <div className="space-y-2">
        {tasks.map((task, i) => (
          <div key={i}
            onClick={() => onToggle(i)}
            className={`bg-white rounded-xl p-4 border cursor-pointer step-card ${
              task.done ? 'border-emerald-200 bg-emerald-50/50' : 'border-ink-100'
            }`}>
            <div className="flex items-start gap-3">
              <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 mt-0.5 transition ${
                task.done ? 'bg-emerald-500 border-emerald-500' : 'border-ink-300'
              }`}>
                {task.done && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
              </div>
              <span className={`text-sm font-jp leading-relaxed ${task.done ? 'line-through text-ink-400' : ''}`}>{task.text}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Main App ───
function App() {
  const [apiKey, setApiKey] = useState(() => {
    try { return localStorage.getItem('studypath_apikey') || ''; } catch(e) { return ''; }
  });
  const [showKeyModal, setShowKeyModal] = useState(!apiKey);
  const [step, setStep] = useState(0);
  const [profile, setProfile] = useState(() => loadData()?.profile || { goals: [] });
  const [plan, setPlan] = useState(() => loadData()?.plan || '');
  const [streaming, setStreaming] = useState(false);
  const [error, setError] = useState('');
  const [tasks, setTasks] = useState(() => loadData()?.tasks || []);
  const [view, setView] = useState(() => loadData()?.plan ? 'plan' : 'form');

  useEffect(() => { saveData({ profile, plan, tasks }); }, [profile, plan, tasks]);

  const handleApiKey = (key) => {
    setApiKey(key);
    try { localStorage.setItem('studypath_apikey', key); } catch(e) {}
    setShowKeyModal(false);
  };

  const generatePlan = async () => {
    setError('');
    setPlan('');
    setStreaming(true);
    setView('plan');

    const userMsg = `
## 生徒情報
- 学年: ${profile.grade}
- 文理: ${profile.stream}
- 平日学習時間: ${profile.weekdayHours}
- 休日学習時間: ${profile.weekendHours}

## 志望校
${(profile.goals||[]).filter(g=>g.school).map(g => `- ${g.priority}: ${g.school} ${g.faculty}`).join('\n')}
${profile.targetScore ? `- 目標偏差値: ${profile.targetScore}` : ''}

## 科目別自己評価
${Object.entries(profile.subjectLevels||{}).map(([s,l]) => `- ${s}: ${l}`).join('\n')}

上記の情報をもとに、この生徒に最適な学習プランを作成してください。
    `.trim();

    try {
      await callOpenAI(apiKey, [
        { role: 'system', content: SYSTEM_PROMPT },
        { role: 'user', content: userMsg },
      ], (text) => setPlan(text));
    } catch (e) {
      setError(e.message);
    }
    setStreaming(false);
  };

  const extractTasks = () => {
    const lines = plan.split('\n');
    const taskLines = [];
    let inFirstSteps = false;
    for (const line of lines) {
      if (line.includes('最初の一歩') || line.includes('今日から')) inFirstSteps = true;
      if (inFirstSteps && (line.startsWith('- ') || line.startsWith('1.') || line.startsWith('2.') || line.startsWith('3.'))) {
        taskLines.push({ text: line.replace(/^[-\d.]\s*/, '').replace(/\*\*/g,''), done: false });
      }
    }
    if (taskLines.length === 0) {
      const bullets = plan.match(/^[-•]\s+.+$/gm) || [];
      bullets.slice(0, 5).forEach(b => taskLines.push({ text: b.replace(/^[-•]\s+/, '').replace(/\*\*/g,''), done: false }));
    }
    setTasks(taskLines);
    setView('tasks');
  };

  const toggleTask = (i) => {
    const t = [...tasks];
    t[i] = {...t[i], done: !t[i].done};
    setTasks(t);
  };

  const reset = () => {
    setProfile({ goals: [] });
    setPlan('');
    setTasks([]);
    setStep(0);
    setView('form');
    setError('');
  };

  return (
    <div className="min-h-screen">
      {showKeyModal && <ApiKeyModal onSubmit={handleApiKey} />}

      {/* Header */}
      <header className="border-b border-ink-100 bg-washi/80 backdrop-blur-sm sticky top-0 z-40">
        <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div className="w-8 h-8 rounded-lg bg-sumi flex items-center justify-center">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f8f6f1" strokeWidth="2" strokeLinecap="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2zM22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
            </div>
            <span className="font-semibold text-sm tracking-tight">StudyPath AI</span>
          </div>
          <button onClick={() => setShowKeyModal(true)}
            className="text-xs text-ink-400 hover:text-ink-600 font-jp flex items-center gap-1">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            API設定
          </button>
        </div>
      </header>

      {/* Main */}
      <main className="max-w-2xl mx-auto px-4 py-8">
        {error && (
          <div className="mb-6 p-4 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm font-jp fade-in">
            <p className="font-medium mb-1">エラーが発生しました</p>
            <p className="text-xs">{error}</p>
            <button onClick={() => setError('')} className="mt-2 text-xs underline">閉じる</button>
          </div>
        )}

        {view === 'form' && (
          <>
            <StepIndicator current={step} total={3} />
            {step === 0 && <Step1 data={profile} onChange={setProfile} onNext={() => setStep(1)} />}
            {step === 1 && <Step2 data={profile} onChange={setProfile} onNext={() => setStep(2)} onBack={() => setStep(0)} />}
            {step === 2 && <Step3 data={profile} onChange={setProfile} onNext={generatePlan} onBack={() => setStep(1)} />}
          </>
        )}

        {view === 'plan' && !plan && streaming && <LoadingState />}
        {view === 'plan' && plan && (
          <PlanResult plan={plan} streaming={streaming} onReset={reset} onSaveTasks={extractTasks} />
        )}

        {view === 'tasks' && (
          <TaskManager tasks={tasks} onToggle={toggleTask} onBack={() => setView('plan')} />
        )}
      </main>

      {/* Footer */}
      <footer className="border-t border-ink-100 mt-16 py-6">
        <p className="text-center text-xs text-ink-400 font-jp">
          StudyPath AI — Powered by OpenAI API. Data stored locally in your browser.
        </p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
